name: Automate_build_apps

on:
  push:

env:
  username: ${{ secrets.USERNAME }}
  password: ${{ secrets.PASSWORD }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Extract metadata
        id: meta
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.USERNAME}}
          password: ${{ secrets.PASSWORD  }}

      - name: Build NodeJS
        uses: docker/build-push-action@v7
        with:
          context: ./nodejs
          file: ./nodejs/Dockerfile
          tags: ${{ env.username }}/nodejs:${{ steps.meta.outputs.SHORT_SHA }}
          push: true

      - name: Build GoLang
        uses: docker/build-push-action@v7
        with:
          context: ./golang
          file: ./golang/Dockerfile
          push: true
          tags: ${{ env.username }}/golang:${{ steps.meta.outputs.SHORT_SHA }}

  CD:
    runs-on: ubuntu-latest
    needs: CI
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Render k8s manifest with SHORT_SHA
        env:
          SHORT_SHA: ${{ steps.meta.outputs.SHORT_SHA }}
        run: |
          sed -i "s/SHORT_SHA/${SHORT_SHA}/g" golang/k8s/deployment.yaml
          sed -i "s/SHORT_SHA/${SHORT_SHA}/g" nodejs/k8s/deployment.yaml

      - name: nodejs deployment
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: |
            apply -f ./nodejs/k8s/

      - name: golang deployment
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: |
            apply -f ./golang/k8s/
      