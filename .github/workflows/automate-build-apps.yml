name: Automate_build_apps

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.PASSWORD }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      SHORT_SHA: ${{ steps.vars.outputs.SHORT_SHA }}

    steps:
      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build_nodejs:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Docker metadata for NodeJS
        id: meta_nodejs
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.USERNAME }}/nodejs
          tags: |
            type=raw,value=sha-${{ needs.prepare.outputs.SHORT_SHA }}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push NodeJS image
        uses: docker/build-push-action@v7
        with:
          context: ./nodejs
          file: ./nodejs/Dockerfile
          push: true
          tags: ${{ steps.meta_nodejs.outputs.tags }}
          labels: ${{ steps.meta_nodejs.outputs.labels }}
          cache-from: type=gha,scope=nodejs
          cache-to: type=gha,mode=max,scope=nodejs

  build_golang:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD