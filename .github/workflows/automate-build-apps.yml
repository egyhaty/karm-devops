name: Automate_build_apps

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      SHORT_SHA: ${{ steps.vars.outputs.SHORT_SHA }}

    steps:
      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build_nodejs:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Docker metadata for NodeJS
        id: meta_nodejs
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.USERNAME }}/nodejs
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push NodeJS image
        uses: docker/build-push-action@v7
        with:
          context: ./nodejs
          file: ./nodejs/Dockerfile
          push: true
          tags: ${{ steps.meta_nodejs.outputs.tags }}
          labels: ${{ steps.meta_nodejs.outputs.labels }}
          cache-from: type=gha,scope=nodejs
          cache-to: type=gha,mode=max,scope=nodejs

  build_golang:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Docker metadata for GoLang
        id: meta_golang
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.USERNAME }}/golang
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push GoLang image
        uses: docker/build-push-action@v7
        with:
          context: ./golang
          file: ./golang/Dockerfile
          push: true
          tags: ${{ steps.meta_golang.outputs.tags }}
          labels: ${{ steps.meta_golang.outputs.labels }}
          cache-from: type=gha,scope=golang
          cache-to: type=gha,mode=max,scope=golang

  update_gitops_values:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_nodejs
      - build_golang

    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Update Helm values tags
        shell: bash
        run: |
          sed -i 's|^\([[:space:]]*tag:[[:space:]]*\).*|\1"sha-${{ needs.prepare.outputs.SHORT_SHA }}"|' charts/charts/values-node.yaml
          sed -i 's|^\([[:space:]]*tag:[[:space:]]*\).*|\1"sha-${{ needs.prepare.outputs.SHORT_SHA }}"|' charts/charts/values-go.yaml

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add charts/values-node.yaml charts/values-go.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update image tags to sha-${{ needs.prepare.outputs.SHORT_SHA }}"
          git push