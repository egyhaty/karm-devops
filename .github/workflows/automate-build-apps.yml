name: Automate_build_apps

on:
  push:

env:
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

jobs:
  Check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./nodejs
          file: ./nodejs/Dockerfile
          tags: ${{ env.DOCKER_USER }}/nodejs:${{ steps.meta.outputs.SHORT_SHA }}
          push: true

      - name: Build & push Go image
        uses: docker/build-push-action@v6
        with:
          context: ./golang
          file: ./golang/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USER }}/golang:${{ steps.meta.outputs.SHORT_SHA }}

      - uses: actions-hub/kubectl@master

      - name: Configure kubeconfig
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: |
            apply -f .nodejs/k8s/deployment.yaml
            apply -f .nodejs/k8s/service.yaml
            apply -f .golang/k8s/deployment.yaml
            apply -f .golang/k8s/service.yaml