name: Automate Build Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.PASSWORD }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      SHORT_SHA: ${{ steps.vars.outputs.SHORT_SHA }}

    steps:
      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build_nodejs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Docker metadata for NodeJS
        id: meta_nodejs
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.USERNAME }}/nodejs
          tags: |
            type=raw,value=sha-${{ needs.prepare.outputs.SHORT_SHA }}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push NodeJS image
        uses: docker/build-push-action@v7
        with:
          context: ./nodejs
          file: ./nodejs/Dockerfile
          push: true
          tags: ${{ steps.meta_nodejs.outputs.tags }}
          labels: ${{ steps.meta_nodejs.outputs.labels }}
          cache-from: type=gha,scope=nodejs
          cache-to: type=gha,mode=max,scope=nodejs

  build_golang:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Docker metadata for GoLang
        id: meta_golang
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.USERNAME }}/golang
          tags: |
            type=raw,value=sha-${{ needs.prepare.outputs.SHORT_SHA }}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push GoLang image
        uses: docker/build-push-action@v7
        with:
          context: ./golang
          file: ./golang/Dockerfile
          push: true
          tags: ${{ steps.meta_golang.outputs.tags }}
          labels: ${{ steps.meta_golang.outputs.labels }}
          cache-from: type=gha,scope=golang
          cache-to: type=gha,mode=max,scope=golang

  update_helm_values:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_nodejs
      - build_golang

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Update Helm values files
        shell: bash
        env:
          SHORT_SHA: ${{ needs.prepare.outputs.SHORT_SHA }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import os

          short_sha = os.environ["SHORT_SHA"]

          files = [
              Path("charts/values-node.yaml"),
              Path("charts/values-go.yaml"),
          ]

          for path in files:
              content = path.read_text()
              content = re.sub(
                  r'(^\s*tag:\s*).*$',
                  rf'\1"sha-{short_sha}"',
                  content,
                  flags=re.MULTILINE
              )
              path.write_text(content)
          PY

      - name: Show diff
        shell: bash
        run: |
          git diff -- charts/values-node.yaml charts/values-go.yaml

      - name: Commit and push updated Helm values
        shell: bash
        env:
          SHORT_SHA: ${{ needs.prepare.outputs.SHORT_SHA }}
        run: |
          git config user.name "egyhaty"
          git config user.email "egyhaty@gmail.com"

          git add charts/values-node.yaml charts/values-go.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update image tags to sha-${SHORT_SHA} [skip ci]"
          git push origin main