apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: golang
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/EmaLinuxawy/karm-devops.git
    targetRevision: main
    path: charts
    helm:
      releaseName: golang
      valueFiles:
        - values.yaml
        - values-go.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 5
      refresh: true
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
