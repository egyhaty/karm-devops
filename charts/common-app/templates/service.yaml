apiVersion: v1
kind: Service
metadata:
  name: {{ include "common-app.name" . }}
  labels:
    {{- include "common-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "common-app.selectorLabels" . | nindent 4 }}
